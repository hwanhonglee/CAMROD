version: "3.9"

x-common: &common
  image: camrod/base:humble
  network_mode: host
  ipc: host
  pid: host
  working_dir: /workspaces/camrod_ws
  volumes:
    - ..:/workspaces/camrod_ws/src:rw
  environment:
    - ROS_DOMAIN_ID=0
    - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
  gpus: all
  command: >
    bash -lc "source /opt/ros/humble/setup.bash &&
              cd /workspaces/camrod_ws &&
              colcon build --symlink-install &&
              source install/setup.bash &&
              sleep infinity"

services:
  map:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install --packages-up-to camrod_map &&
                source install/setup.bash &&
                ros2 launch camrod_map map.launch.py"

  sensing:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install --packages-up-to camrod_sensing &&
                source install/setup.bash &&
                ros2 launch camrod_sensing sensing.launch.py"

  localization:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install --packages-up-to camrod_localization &&
                source install/setup.bash &&
                ros2 launch camrod_localization localization.launch.py"

  planning:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install --packages-up-to camrod_planning &&
                source install/setup.bash &&
                ros2 launch camrod_planning planning.launch.py"

  perception:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install --packages-up-to camrod_perception &&
                source install/setup.bash &&
                ros2 launch camrod_perception perception.launch.py"

  platform:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install --packages-up-to camrod_platform camrod_sensor_kit &&
                source install/setup.bash &&
                ros2 launch camrod_platform platform.launch.py"

  bringup:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/camrod_ws &&
                colcon build --symlink-install &&
                source install/setup.bash &&
                ros2 launch camrod_bringup bringup.launch.py"
