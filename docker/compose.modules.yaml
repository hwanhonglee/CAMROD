version: "3.9"

x-common: &common
  image: camping_cart/base:humble
  network_mode: host
  ipc: host
  pid: host
  working_dir: /workspaces/cart_test_ws
  volumes:
    - ..:/workspaces/cart_test_ws/src:rw
  environment:
    - ROS_DOMAIN_ID=0
    - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
  gpus: all
  command: >
    bash -lc "source /opt/ros/humble/setup.bash &&
              cd /workspaces/cart_test_ws &&
              colcon build --symlink-install &&
              source install/setup.bash &&
              sleep infinity"

services:
  map:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install --packages-up-to camping_cart_map &&
                source install/setup.bash &&
                ros2 launch camping_cart_map map.launch.py"

  sensing:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install --packages-up-to camping_cart_sensing &&
                source install/setup.bash &&
                ros2 launch camping_cart_sensing sensing.launch.py"

  localization:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install --packages-up-to camping_cart_localization &&
                source install/setup.bash &&
                ros2 launch camping_cart_localization localization.launch.py"

  planning:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install --packages-up-to camping_cart_planning &&
                source install/setup.bash &&
                ros2 launch camping_cart_planning planning.launch.py"

  perception:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install --packages-up-to camping_cart_perception &&
                source install/setup.bash &&
                ros2 launch camping_cart_perception perception.launch.py"

  platform:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install --packages-up-to camping_cart_platform camping_cart_sensor_kit &&
                source install/setup.bash &&
                ros2 launch camping_cart_platform platform.launch.py"

  bringup:
    <<: *common
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                cd /workspaces/cart_test_ws &&
                colcon build --symlink-install &&
                source install/setup.bash &&
                ros2 launch camping_cart_bringup bringup.launch.py"
