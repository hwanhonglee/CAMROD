/sensing/lidar_preprocessor:
  ros__parameters:
    input_topic: "/sensing/lidar/vanjee/points_raw"
    filtered_topic: "/sensing/lidar/points_filtered"
    lidar_diagnostic_topic: "/sensing/lidar/diagnostic"
    publish_lidar_diagnostic: false
    min_range: 0.3
    max_range: 35.0
    min_z: -1.0
    max_z: 2.0
    ground_filter_mode: "z"
    ground_z_min: -0.25
    ground_z_max: 0.25
    stamp_with_now: true
    frame_id_override: "lidar_link"
    publish_filtered: true
