# Nav2 vehicle profile: footprint and vehicle dynamics.

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.4
      max_linear_vel: 1.4
      min_linear_vel: 0.0
      max_linear_accel: 1.5
      max_angular_vel: 1.2
      max_angular_accel: 3.0
      lookahead_dist: 0.6
      min_lookahead_dist: 0.25
      max_lookahead_dist: 1.2
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.2
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: True
      min_approach_linear_velocity: 0.15
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: False
      max_allowed_time_to_collision: 1.0
      use_regulated_linear_velocity_scaling: True
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.5
      use_cost_regulated_linear_velocity_scaling: True
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0

    # 2026-02-25: DWB block removed from default profile.
    # If DWB is required later, keep it in a dedicated optional overlay.

local_costmap:
  local_costmap:
    ros__parameters:
      footprint: "[[0.9, 0.4], [0.9, -0.4], [-0.9, -0.4], [-0.9, 0.4]]"
      robot_radius: 0.0

global_costmap:
  global_costmap:
    ros__parameters:
      footprint: "[[0.9, 0.4], [0.9, -0.4], [-0.9, -0.4], [-0.9, 0.4]]"
      robot_radius: 0.0
