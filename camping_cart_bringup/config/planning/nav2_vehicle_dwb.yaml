# Nav2 vehicle profile (optional): enable DWB alongside FollowPath.
# Usage:
#   ros2 launch camping_cart_bringup bringup.launch.py \
#     nav2_vehicle_param_file:=/home/hong/cart_test_ws/src/camping_cart_bringup/config/planning/nav2_vehicle_dwb.yaml
#
# Notes:
# - Default profile remains nav2_vehicle.yaml (FollowPath only).
# - This file keeps modules selectable without deleting DWB support.

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath", "DwbController"]
    default_controller: FollowPath

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.4
      max_linear_vel: 1.4
      min_linear_vel: 0.0
      max_linear_accel: 1.5
      max_angular_vel: 1.2
      max_angular_accel: 3.0
      lookahead_dist: 0.6
      min_lookahead_dist: 0.25
      max_lookahead_dist: 1.2
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.2
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: True
      min_approach_linear_velocity: 0.15
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: False
      max_allowed_time_to_collision: 1.0
      use_regulated_linear_velocity_scaling: True
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.5
      use_cost_regulated_linear_velocity_scaling: True
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0

    DwbController:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      publish_evaluation: False
      publish_global_plan: False
      publish_transformed_plan: False
      publish_local_plan: False
      publish_trajectories: False
      publish_cost_grid_pc: False
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 1.4
      max_vel_y: 0.0
      max_vel_theta: 1.2
      min_speed_xy: 0.0
      max_speed_xy: 1.4
      min_speed_theta: 0.0
      acc_lim_x: 1.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.0
      decel_lim_x: -1.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.0
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.1
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "PathAlign", "PathDist", "GoalAlign", "GoalDist"]
      ObstacleFootprint.scale: 0.02
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      footprint: "[[0.9, 0.4], [0.9, -0.4], [-0.9, -0.4], [-0.9, 0.4]]"
      robot_radius: 0.0

global_costmap:
  global_costmap:
    ros__parameters:
      footprint: "[[0.9, 0.4], [0.9, -0.4], [-0.9, -0.4], [-0.9, 0.4]]"
      robot_radius: 0.0
