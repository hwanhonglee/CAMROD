/planning/planning_state_machine:
  ros__parameters:
    enabled: true
    health_diagnostic_topic: "/system/diagnostic"
    pose_topic: "/planning/lanelet_pose"
    goal_topic: "/planning/goal_pose"
    state_topic: "/planning/state_machine/state"
    estop_topic: "/planning/state_machine/estop"
    diagnostics_topic: "/planning/diagnostic"

    # Keypoint map for state-based auto goals.
    # Supported formats:
    # 1) keypoints: {name: {x,y,z,frame_id}}
    # 2) drop_zones: [{x,y,z,...}] (fallback for drop_zone)
    keypoints_yaml: "/home/hong/cart_test_ws/src/camping_cart_bringup/config/planning/planning_state_machine_keypoints.yaml"
    startup_goal_key: "drop_zone"
    warn_goal_key: "garage"

    # Policies:
    # - system OK at startup: publish startup_goal_key once
    # - system WARN: publish warn_goal_key (rate-limited)
    # - system ERROR: estop true
    auto_startup_goal: true
    auto_warn_recovery_goal: true
    auto_estop_on_error: true

    # Runtime tuning
    min_goal_publish_interval_s: 1.0
    goal_reached_distance_m: 0.8
    loop_rate_hz: 5.0
