# Nav2 base profile: framework defaults and common node wiring.

planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 5.0
    planner_plugins: ["Smac2D", "GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: True
      allow_unknown: False

    Smac2D:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      allow_unknown: False
      tolerance: 0.5
      downsample_costmap: False
      downsampling_factor: 1
      use_astar: True
      motion_model_for_search: "REEDS_SHEPP"
      # 2026-02-25: Finer heading discretization for smoother corner geometry.
      angle_quantization_bins: 128

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    odom_topic: /localization/odometry/filtered
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    # 2026-02-25: Use a single active controller by default to avoid
    # duplicate debug topics (/planning/cost_cloud, /planning/evaluation)
    # from unused DWB plugin loading.
    controller_plugins: ["FollowPath"]
    default_controller: FollowPath

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.25
      stateful: False

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: map
      robot_base_frame: robot_base_link
      # HH_260305-00:00 Faster local updates for more responsive local-path/grid overlays.
      update_frequency: 8.0
      publish_frequency: 5.0
      rolling_window: True
      width: 50
      height: 50
      resolution: 0.08
      track_unknown_space: True
      plugins:
        - lanelet_cost_layer_base
        - lanelet_cost_layer_local_path
        - lidar_cost_layer
        - radar_cost_layer
        - inflation_layer

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: map
      robot_base_frame: robot_base_link
      # HH_260305-00:00 Increase master global costmap refresh to reduce delayed marker updates.
      update_frequency: 2.0
      publish_frequency: 1.5
      rolling_window: False
      width: 165
      height: 100
      resolution: 0.08
      origin_x: -82.5
      origin_y: -34.2
      track_unknown_space: True
      plugins:
        - lanelet_cost_layer_base
        - lidar_cost_layer
        - radar_cost_layer
        - inflation_layer

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: robot_base_link
    odom_topic: /localization/odometry/filtered
    transform_tolerance: 0.2

behavior_server:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    local_frame: odom
    robot_base_frame: robot_base_link
    transform_tolerance: 0.2
