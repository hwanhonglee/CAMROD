# 2026-02-02 10:32 Sync from package config into bringup/config
# HH_260112 Align node parameter keys with /perception namespace + short names.
/perception/obstacle_fusion:
  ros__parameters:
    input_cloud_topic: "/sensing/lidar/points_filtered"
    detection_topic: "/perception/camera/detections_2d"
    camera_info_topic: "/sensing/camera/processed/camera_info"
    output_topic: "/perception/obstacles"
    # HH_260220: Use sensor_kit static TF frame; calibration broadcaster removed.
    camera_frame: "camera_front_link"
    use_camera_filter: true
    keep_lidar_when_no_detections: true
    # HH_260109 Perception obstacle fusion (camera detections + LiDAR).

/perception/obstacle_lidar:
  ros__parameters:
    input_topic: "/sensing/lidar/points_filtered"
    bbox_topic: "/perception/lidar/bboxes"
    eps: 0.25
    min_pts: 12
    max_points: 8000
    use_box: true
    x_min: 0.0
    x_max: 5.0
    y_min: -3.0
    y_max: 3.0
    z_min: -3.0
    z_max: 5.0
    min_cluster_points: 25
    min_size_x: 0.10
    min_size_y: 0.10
    min_size_z: 0.10
    marker_lifetime_sec: 0.15
    draw_text: true
